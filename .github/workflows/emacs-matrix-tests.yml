name: Test Emacs Matrix
on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
permissions: {}
jobs:
  test:
    name: 'Install and Test'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        emacs-version:
          - '28.2'
          - '29.4'
          - '30.2'
          - 'release-snapshot'
          # - 'snapshot'
    steps:
    - uses: actions/checkout@v6
      with:
        persist-credentials: false
    - uses: purcell/setup-emacs@master
      with:
        version: ${{ matrix.emacs-version }}
    - run: echo "💡 The ${{ github.repository }} repository has been cloned to the runner."
    - run: echo "🖥️ The workflow is now ready to test your code on the runner."
    - name: Print working directory
      run: echo "Current working directory is $PWD"
    - name: List files in the repository
      run: |
        ls ${{ github.workspace }}
    - name: Make config dir to guaranteed location.  Do it before we run Emacs the first time.
      run: mkdir ~/.emacs.d
    - name: Check Emacs version
      run: emacs --version
    - name: Clone package Loopy to sub-folder
      run: |
        git clone 'https://github.com/okamsn/loopy.git' ./loopy
    - name: Build Tar file for base package
      run: make --directory=./loopy tar
    - name: Install packages
      run: emacs -batch -l tests/install-script.el
    - name: Dash tests
      run: emacs -batch -l tests/load-path.el -l ert -l tests/dash-tests.el -f ert-run-tests-batch-and-exit
    - name: Byte Compilation test
      run: emacs -batch --eval='(package-activate-all)' -f batch-byte-compile ~/.emacs.d/elpa/loopy-dash*/*.el
    - name: Native Compilation test
      run: |
        if [[ t = $(emacs -batch --eval="(prin1 (and (fboundp 'batch-native-compile) (funcall 'native-comp-available-p)))")  ]]; then
            emacs -batch --eval='(package-activate-all)' -f batch-native-compile ~/.emacs.d/elpa/loopy-dash*/*.el
        else
           echo Not running due to not having native compilation installed.
        fi
    - run: echo "🍏 This job's status is ${{ job.status }}."
